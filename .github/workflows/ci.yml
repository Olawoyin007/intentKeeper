name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for docs-only changes
        id: docs-check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          changed=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          non_docs=$(echo "$changed" | grep -Ev '^(docs/|.*\.md$|\.github/[^/]+\.md$)' || true)
          if [ -z "$non_docs" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "Docs-only change — skipping test suite."
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python ${{ matrix.python-version }}
        if: steps.docs-check.outputs.docs_only != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        if: steps.docs-check.outputs.docs_only != 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        if: steps.docs-check.outputs.docs_only != 'true'
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        if: steps.docs-check.outputs.docs_only != 'true'
        run: ruff check server/

      - name: Check formatting with black
        if: steps.docs-check.outputs.docs_only != 'true'
        run: black --check server/

      - name: Run tests
        if: steps.docs-check.outputs.docs_only != 'true'
        run: pytest tests/ -v --cov=server --cov-report=term-missing

  protect-manifesto:
    name: Protect MANIFESTO.md
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check MANIFESTO.md is not modified
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^MANIFESTO.md$'; then
            echo "::error::MANIFESTO.md is protected and cannot be modified via PR."
            echo "The manifesto evolves only to tighten protections, never to weaken them."
            echo "Changes to MANIFESTO.md require maintainer approval outside the normal PR process."
            exit 1
          fi
          echo "MANIFESTO.md unchanged — check passed."

  extension-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for docs-only changes
        id: docs-check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          changed=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          non_docs=$(echo "$changed" | grep -Ev '^(docs/|.*\.md$|\.github/[^/]+\.md$)' || true)
          if [ -z "$non_docs" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "Docs-only change — skipping extension lint."
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate manifest.json
        if: steps.docs-check.outputs.docs_only != 'true'
        run: python -c "import json; json.load(open('extension/manifest.json'))"

      - name: Check extension files exist
        if: steps.docs-check.outputs.docs_only != 'true'
        run: |
          test -f extension/core/classifier.js
          test -f extension/platforms/twitter.js
          test -f extension/platforms/reddit.js
          test -f extension/platforms/youtube.js
          test -f extension/background.js
          test -f extension/styles.css
          test -f extension/popup/popup.html
          test -f extension/popup/popup.js

      - name: Set up Node
        if: steps.docs-check.outputs.docs_only != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        if: steps.docs-check.outputs.docs_only != 'true'
        working-directory: extension
        run: npm ci

      - name: Run extension tests (jest)
        if: steps.docs-check.outputs.docs_only != 'true'
        working-directory: extension
        run: npm test
