# IntentKeeper Intent Definitions - v2
#
# Streamlined from 9 to 6 intents for cleaner classification boundaries.
#
# Design principle: each intent must be meaningfully distinct in framing
# AND drive a different user action. Intents that blurred into each other
# have been merged:
#   - engagement_bait + reaction_farming  -> engagement_bait (both: hide)
#   - hype + clickbait                    -> hype            (both: tag)
#   - genuine + neutral                   -> genuine         (both: pass)

intents:
  ragebait:
    description: "Content engineered to provoke anger or outrage - inflammatory framing, mockery, strawmen designed to make you furious at a person or group"
    action: blur
    weight: 0.9
    indicators:
      - "Inflammatory language targeting groups or individuals"
      - "Strawman arguments presented as the other side's real position"
      - "Mocking or contemptuous tone designed to infuriate, not inform"
      - "Absolutist framing (always, never, all, none, every single time)"
      - "Cherry-picked examples presented as universal truth"

  fearmongering:
    description: "Exaggerated or unverifiable threats - doom framing, vague catastrophizing, crisis claims without facts or sources"
    action: tag
    weight: 0.7
    indicators:
      - "Apocalyptic framing of current events without evidence"
      - "Vague scary predictions with no verifiable grounding"
      - "They're coming for your X language"
      - "Everything is worse than ever claims"
      - "Urgency without actionable or verifiable information"

  hype:
    description: "Manufactured urgency, FOMO, or deceptive framing designed to force a click or reaction before you can evaluate - includes clickbait titles"
    action: tag
    weight: 0.5
    indicators:
      - "Limited time pressure with no real deadline"
      - "This changes everything / never been done before"
      - "Deliberately vague payoff to force a click"
      - "You won't believe / shocking / the truth about"
      - "Save this before I delete it / algorithm is burying this"

  engagement_bait:
    description: "Content engineered purely for metrics with no informational value - likes, replies, shares, or manufactured comment section conflict"
    action: hide
    weight: 0.6
    indicators:
      - "Reply with your X / tag someone who..."
      - "Retweet if you agree / like if this is you"
      - "Poses a question solely to generate comment volume"
      - "Makes a statement designed to be wrong on purpose to bait corrections"
      - "Pick a side / no nuance allowed - engineered for maximum replies"

  divisive:
    description: "Us-vs-them framing that manufactures conflict between groups - moral sorting, tribal identity triggers, group generalizations"
    action: tag
    weight: 0.7
    indicators:
      - "People who X are Y (group generalizations)"
      - "Real [group] would never..."
      - "If you don't support X, you're Y"
      - "The left/right always..."
      - "Moral sorting of people by product choice, lifestyle, or affiliation"

  genuine:
    description: "Authentic content with no manipulation intent - personal experience, honest perspective, factual information, genuine questions, informational announcements"
    action: pass
    weight: 0.0
    indicators:
      - "Personal experience with specific details"
      - "Nuanced take that acknowledges complexity or uncertainty"
      - "Factual statements or informational announcements"
      - "Genuine questions seeking understanding"
      - "Admits uncertainty or limitations"


# Few-shot examples with reasoning.
# Reasoning teaches the model the decision logic, not just the label.
# Weighted toward boundary cases where the model is most likely to err.
few_shot_examples:

  # --- ragebait ---

  - content: "This is EXACTLY why I hate these people. They always do this. Every. Single. Time."
    intent: ragebait
    reasoning: "Inflammatory tribal language with absolutist framing (always, every single time). The goal is to provoke anger at a group, not discuss an issue."

  - content: "Can you BELIEVE the absolute state of this? How are people still defending this?"
    intent: ragebait
    reasoning: "Mocking, contemptuous tone with no argument. Pure emotional provocation designed to generate outrage at unspecified defenders."

  - content: "People on the other side don't just disagree - they actively want to destroy everything you care about."
    intent: ragebait
    reasoning: "Despite the us-vs-them language, the primary signal is threat and anger - trying to make you furious, not just choose a side. That makes it ragebait, not divisive."

  - content: "Oh sure, politicians definitely care about regular people. I totally believe that."
    intent: ragebait
    reasoning: "Sarcasm designed to provoke contempt. Despite polite surface words, the intent is to make the reader feel angry at politicians."

  # --- fearmongering ---

  - content: "Something big is about to happen in the financial markets. I can't say more but protect yourself."
    intent: fearmongering
    reasoning: "Vague insider framing creates fear without any verifiable claim. 'Can't say more' avoids accountability while maximising anxiety."

  - content: "🚨 ALERT: Something is being quietly rolled out that will affect every household. Read before they delete this."
    intent: fearmongering
    reasoning: "The urgency here is about DANGER coming to the reader, not about missing something good. Vague threat + alarm signals = fearmongering. If the urgency is 'danger/threat', classify as fearmongering - not hype."

  - content: "Your water, your food, your air. They've been poisoning it for decades and nobody talks about it."
    intent: fearmongering
    reasoning: "Vague 'they' as threat with no named source. 'Decades' and 'poisoning' sound specific but there is no name, study, organisation, or link. Unnamed authority ('they', 'doctors', 'experts') without specific citations is NOT a real source - this is fearmongering."

  - content: "🚨🚨 MUST READ 🚨🚨 Everything is falling apart RIGHT NOW and nobody is talking about it 😱😱"
    intent: fearmongering
    reasoning: "Apocalyptic claim with zero specifics. Alarm emoji clusters and urgency language trigger fear response. No facts, no source, no actionable information."

  - content: "New WHO report: antibiotic resistance could cause 10M deaths/year by 2050. Key finding: 70% of antibiotics now ineffective against common infections."
    intent: genuine
    reasoning: "Alarming content, but cites a specific source (WHO), gives specific numbers (10M, 70%), implies policy action. Alarming facts with sources are genuine, not fearmongering."

  # --- hype ---

  - content: "🔥 About to share something the industry doesn't want you to know. Save this before I delete it."
    intent: hype
    reasoning: "Manufactured urgency and false exclusivity. 'Save before I delete' is a fake scarcity trigger. No actual information is shared."

  - content: "She Said ONE Thing To Her Boss And Got Promoted The Next Day (This Actually Works)"
    intent: hype
    reasoning: "Classic clickbait structure: specific-sounding but vague payoff, false credibility marker, forces a click to resolve the mystery. Hype and clickbait are the same intent."

  - content: "Just read the new IPCC synthesis report. The ocean acidification data is alarming - pH has dropped 0.1 units since industrialisation, faster than any point in 300M years."
    intent: genuine
    reasoning: "Enthusiastic but backs the claim with a specific source, specific measurement, and specific comparison period. Enthusiasm with substance is genuine."

  # --- engagement_bait ---

  - content: "💯 Like if you agree 👇 Drop a ❤️ if this is you"
    intent: engagement_bait
    reasoning: "No content whatsoever. Every element is engineered to generate metric reactions. Pure engagement farming."

  - content: "Hot take: pineapple on pizza is good. Fight me in the comments. 🍕"
    intent: engagement_bait
    reasoning: "The 'fight me' framing is the tell. No genuine position being defended - the goal is comment volume through a low-stakes divisive topic. Reaction farming is engagement_bait."

  # --- engagement_bait ---

  - content: "Marvel fans vs DC fans. Comment which side you're on. No switching allowed."
    intent: engagement_bait
    reasoning: "Despite the two-sides framing (which looks divisive), the explicit call to action ('Comment which side you're on') reveals the goal is comment volume. When a call-to-action is present, engagement_bait takes priority over divisive."

  # --- divisive ---

  - content: "Millennials ruined the housing market. It's really that simple."
    intent: divisive
    reasoning: "Blames a demographic group, but without explicit contemptuous language or calls to feel angry. Group blame that sorts and accuses = divisive. Add expressions of contempt ('how can people be this stupid', 'absolute audacity') and it becomes ragebait."

  - content: "There are two types of people in this world. You already know which one you are."
    intent: divisive
    reasoning: "Explicit binary sorting without rage or metric farming. The goal is to make the reader self-assign to a tribe and judge the other half."

  - content: "The kind of person who doesn't tip says everything about their character."
    intent: divisive
    reasoning: "Moral judgment that sorts people by behaviour. Not trying to get likes or generate outrage - trying to make the reader morally sort themselves and others."

  # --- genuine ---

  - content: "I've been dealing with anxiety for 10 years. Here's what actually helped me, though everyone's different."
    intent: genuine
    reasoning: "Personal experience with a qualifier showing honesty ('though everyone's different'). That caveat is a marker of authentic communication, not agenda."

  - content: "The new transit line opens March 15. Here's the schedule and route map."
    intent: genuine
    reasoning: "Pure factual information. No emotional framing, urgency, or manipulation. Genuine covers informational announcements, not just personal stories."


# Classification rules
rules:
  - "Focus on HOW content is framed, not what it's about - political content can be genuine OR ragebait"
  - "ragebait makes you feel ANGER (contempt, fury) at someone; divisive makes you SORT people into groups - classify by the primary signal"
  - "Group blame without explicit contempt ('Millennials ruined X') = divisive. Add contemptuous language ('how can people be this stupid') = ragebait."
  - "fearmongering urgency is about DANGER coming to the reader ('this will affect every household', 'protect yourself'); hype urgency is about MISSING something good ('this changes everything', 'the secret to X')"
  - "When a call-to-action is present ('comment below', 'which side', 'your turn 👇') without a stated purpose, engagement_bait takes priority over divisive. Exception: a genuine question with a stated reason ('helps us prioritise', 'trying to understand') = genuine."
  - "Vague appeal to unnamed authority ('doctors say', 'experts warn', 'they've been doing this for decades') with no specific name, study, or link is NOT a real source - classify as fearmongering, not genuine"
  - "fearmongering includes questions designed to trigger anxiety ('Are you prepared?', 'Do you know what's in yours?') even when phrased as a question - the danger framing is what matters, not the sentence type"
  - "Contempt and moral dismissal ('some people are just bad', 'they can't handle the truth', 'no reasoning with them') are forms of contemptuous language that push content from divisive into ragebait"
  - "Conspiracy insinuation with contempt ('The media LOVES burying this. Wonder why?') is ragebait - the rhetorical question is a device to provoke anger and suspicion, not a genuine curiosity trigger"
  - "Personal experience framing ('I spent 6 months testing...', 'I worked on this for 2 years') does NOT automatically make content genuine - check whether the payoff is substantive or vague hype"
  - "engagement_bait and reaction_farming are the same intent - hide both"
  - "hype and clickbait are the same intent - tag both"
  - "genuine covers both personal authentic content AND neutral factual information - no manipulation intent = genuine"
  - "Sarcasm can be ragebait even when surface words are polite - judge the emotional effect intended"
  - "Alarming content with specific facts and sources is genuine, not fearmongering"
  - "If content starts with [Post: ...], that is the original tweet being replied to - use it to understand the reply's intent"
