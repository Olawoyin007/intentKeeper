# IntentKeeper Intent Definitions
#
# Each intent has:
# - description: What this intent means
# - action: Default action (blur, tag, hide, pass)
# - weight: Base manipulation score (0.0 = benign, 1.0 = highly manipulative)

intents:
  ragebait:
    description: "Content designed to provoke anger, outrage, or hostile reactions"
    action: blur
    weight: 0.9
    indicators:
      - "Inflammatory language targeting groups"
      - "Strawman arguments presented as real positions"
      - "Cherry-picked examples presented as universal"
      - "Mocking tone toward perceived opponents"
      - "Absolutist framing (always, never, all, none)"

  fearmongering:
    description: "Exaggerated threats, doom content, catastrophizing"
    action: tag
    weight: 0.7
    indicators:
      - "Apocalyptic framing of current events"
      - "Vague but scary predictions"
      - "They're coming for your X language"
      - "Everything is worse than ever claims"
      - "Urgency without actionable information"

  hype:
    description: "Manufactured urgency, FOMO triggers, artificial excitement"
    action: tag
    weight: 0.5
    indicators:
      - "Limited time pressure"
      - "Everyone is doing X"
      - "You're missing out on..."
      - "This changes everything"
      - "BREAKING (for non-breaking content)"

  engagement_bait:
    description: "Content designed solely to generate metrics, not value"
    action: hide
    weight: 0.6
    indicators:
      - "Reply with your X"
      - "Tag someone who..."
      - "Retweet if you agree"
      - "What's your unpopular opinion"
      - "Questions with obvious answers"

  divisive:
    description: "Us-vs-them framing, tribal triggers, manufactured conflict"
    action: tag
    weight: 0.7
    indicators:
      - "People who X are Y"
      - "The left/right always..."
      - "If you don't support X, you're Y"
      - "Real [group] would never..."
      - "Which side are you on"

  clickbait:
    description: "Misleading title or thumbnail designed to deceive about actual content"
    action: tag
    weight: 0.7
    indicators:
      - "Title promises content the video does not deliver"
      - "You won't believe... / Shocking... / This will change your life framing"
      - "Exaggerated emotional reaction or face in thumbnail description"
      - "Deliberately vague to force a click"
      - "Number lists that exaggerate scope (top 100, every single...)"

  reaction_farming:
    description: "Content engineered to provoke high-volume emotional reactions in comments"
    action: tag
    weight: 0.6
    indicators:
      - "Poses a divisive question solely to inflame the comment section"
      - "Makes a statement designed to be wrong on purpose"
      - "Invites tribal conflict between fanbases or groups"
      - "Hot take with no supporting substance, drops opinion then goes silent"
      - "Asks audience to pick a side with no nuance offered"

  genuine:
    description: "Authentic insight, honest perspective, original thought"
    action: pass
    weight: 0.0
    indicators:
      - "Personal experience with specifics"
      - "Nuanced take acknowledging complexity"
      - "Asks genuine questions seeking understanding"
      - "Shares information without emotional manipulation"
      - "Admits uncertainty or limitations"

  neutral:
    description: "Informational content without manipulation intent"
    action: pass
    weight: 0.0
    indicators:
      - "Factual statements"
      - "News without editorializing"
      - "Questions seeking information"
      - "Announcements and updates"
      - "Resource sharing"

# Few-shot examples to improve classification accuracy
few_shot_examples:
  - content: "This is EXACTLY why I hate [political party]. They always do this. Every. Single. Time."
    intent: ragebait

  - content: "They're trying to take everything from us. By 2025, you won't recognize this country."
    intent: fearmongering

  - content: "BREAKING: This new AI tool is going to change EVERYTHING. I can't believe more people aren't talking about this!"
    intent: hype

  - content: "Reply with your favorite pizza topping and I'll tell you your personality type!"
    intent: engagement_bait

  - content: "People who don't wake up at 5am are just lazy. Winners have discipline."
    intent: divisive

  - content: "I've been dealing with anxiety for 10 years. Here's what actually helped me, though everyone's different."
    intent: genuine

  - content: "The new transit line opens March 15. Here's the schedule and route map."
    intent: neutral

  - content: "So tired of people who can't see the OBVIOUS truth. If you don't get it by now, you never will."
    intent: ragebait

  - content: "Tried this recipe last night. The garlic was perfect but I'd add more salt next time. 7/10."
    intent: genuine

  - content: "🚨 ALERT: Society is COLLAPSING. Get out while you still can."
    intent: fearmongering

  - content: "I Tried EVERY Fast Food Chain For 30 Days (The Results Will SHOCK You)"
    intent: clickbait

  - content: "We Bought The CHEAPEST Thing From 50 Different Countries (NOT What We Expected)"
    intent: clickbait

  - content: "Pineapple belongs on pizza. Change my mind. 🍕"
    intent: reaction_farming

  - content: "Marvel fans vs DC fans. Comment which side you're on. No switching allowed."
    intent: reaction_farming

  # Sarcasm edge cases - framing is key, not surface meaning
  - content: "Oh sure, politicians definitely care about us regular people. I totally believe that."
    intent: ragebait

  - content: "Oh wow, another AI that will 'change everything'. Bold claim. Where have I heard that before."
    intent: genuine

  # ragebait - varied styles
  - content: "Can you BELIEVE this is what passes for leadership these days? No wonder everything is falling apart."
    intent: ragebait

  - content: "If you still defend this after everything that's come out, there is genuinely no reasoning with you."
    intent: ragebait

  # Emoji-heavy content
  - content: "🚨🚨 MUST READ 🚨🚨 Everything is falling apart RIGHT NOW and nobody is talking about it 😱😱"
    intent: fearmongering

  - content: "Just made pasta 🍝 added too much salt but still ate the whole bowl 😅 10/10 would repeat"
    intent: genuine

  - content: "💯 Like if you agree 👇 Drop a ❤️ if this is you"
    intent: engagement_bait

  # Mixed-intent - primary signal wins
  - content: "Scientists WARN: your water supply may already be contaminated. Do you actually know what's in yours?"
    intent: fearmongering

  - content: "I've been struggling with anxiety (genuine) but honestly the government is LITERALLY trying to destroy us all"
    intent: fearmongering

  - content: "Great analysis here - though I think people who disagree are just too dumb to get it"
    intent: divisive

  # divisive - varied styles
  - content: "There are two types of people in this world. You already know which one you are."
    intent: divisive

  - content: "Millennials did X. Gen Z is doing Y. And somehow the rest of us are supposed to just accept this."
    intent: divisive

  - content: "You either understand what's happening or you're part of the problem. No middle ground."
    intent: divisive

  # hype - manufactured urgency
  - content: "Drop everything. This thread is the most important thing you will read this year."
    intent: hype

  - content: "I spent 6 months testing 47 productivity apps. This ONE changed everything. I should have found it sooner."
    intent: hype

  - content: "🔥 About to share something the industry doesn't want you to know. Save this before I delete it."
    intent: hype

  - content: "This is the skill that separates the 1% from everyone else. I'm giving it away for free. For now."
    intent: hype

  # engagement_bait - varied triggers
  - content: "Name a song that defined your decade. I'll go first: ... Your turn 👇"
    intent: engagement_bait

  - content: "Pick one and defend your choice: remote work or office. No sitting on the fence."
    intent: engagement_bait

  - content: "What's your unpopular food opinion? The spicier the take the better 🌶️"
    intent: engagement_bait

  # clickbait - deceptive framing
  - content: "She Said ONE Thing To Her Boss And Got Promoted The Next Day (This Actually Works)"
    intent: clickbait

  - content: "The Truth About Breakfast That Nutritionists Don't Want You To Know"
    intent: clickbait

  - content: "I Tried Living Like A Billionaire For 30 Days. What Happened Shocked Even Me."
    intent: clickbait

  # reaction_farming - manufactured conflict
  - content: "Unpopular opinion incoming. I know this will divide people but I'm saying it anyway."
    intent: reaction_farming

  - content: "Hot take: [statement]. Come at me in the comments."
    intent: reaction_farming

  - content: "Name your most controversial opinion. The comment section is going to be 🔥"
    intent: reaction_farming

  # neutral - informational with no manipulation
  - content: "The library will be closed on Monday for maintenance. Normal hours resume Tuesday at 9am."
    intent: neutral

  - content: "Python 3.12 released. Key changes: 25% faster interpreter, improved error messages, new typing features."
    intent: neutral

  - content: "Registration for the spring semester opens December 1st. See the academic calendar for deadlines."
    intent: neutral

  - content: "Weather this week: partly cloudy Tuesday through Thursday, rain expected Friday."
    intent: neutral

  - content: "This study shows X might reduce Y - fascinating if replicated. I'd wait for peer review before changing anything."
    intent: genuine

# Classification rules (for the LLM prompt)
rules:
  - "Focus on HOW content is framed, not the topic itself"
  - "Political content can be genuine OR manipulative - analyze the framing"
  - "Personal stories with specific details tend to be genuine"
  - "Sensational language and ALL CAPS often indicate manipulation"
  - "Content triggering strong immediate emotional reaction is likely manipulative"
  - "Nuance and uncertainty are markers of genuine content"
  - "Questions seeking genuine answers are different from engagement bait"
  - "Video titles using 'shocking', 'you won't believe', or deliberately vague hooks are clickbait"
  - "Content that exists purely to generate comment section conflict is reaction_farming"
